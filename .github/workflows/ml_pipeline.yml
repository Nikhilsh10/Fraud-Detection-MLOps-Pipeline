name: ML Pipeline

on:
  push:
    branches:
      - main
      - test-ecr-push
  repository_dispatch:
    types: [retrain-model]

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,serving]
          
      - name: Download Data
        env:
          KAGGLE_JSON: ${{ secrets.KAGGLE_JSON }}
        run: |
          mkdir -p ~/.config/kaggle
          echo "$KAGGLE_JSON" > ~/.config/kaggle/kaggle.json
          chmod 600 ~/.config/kaggle/kaggle.json
          python -m src.data.download
          
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Train and Register Model
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            DRIFT_SCORE="${{ github.event.client_payload.drift_share }}"
            python -m src.training.train --trigger drift_retrain --drift-score "$DRIFT_SCORE"
          else
            python -m src.training.train
          fi
          python scripts/promote_model.py
          

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: fraud-detection
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
